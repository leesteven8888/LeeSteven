<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping's E-Paper Host Controller</title>
   
    <style>
        /* --- Base Reset & Global Styles --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, 'Noto Sans', sans-serif;
            background: #f5f7fb;
            padding: 16px;
            color: #1e293b;
            line-height: 1.6;
            max-width: 100%;
            overflow-x: hidden;
        }

        /* --- Navigation Tabs --- */
        .tabs-container {
            margin-bottom: 20px;
        }

        .tab-buttons {
            display: flex;
            background-color: #fff;
            border-radius: 8px 8px 0 0;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .tab-button {
            flex: 1;
            padding: 15px 20px;
            text-align: center;
            border: none;
            border-bottom: 3px solid transparent;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            background: none;
            color: #333;
        }

        .tab-button:hover {
            background-color: #e0e0e0;
        }

        .tab-button.active {
            background-color: #fff;
            border-bottom: 3px solid #4a6ee0;
            color: #4a6ee0;
        }

        /* --- Main Layout Containers --- */
        .tab-content {
            display: none;
            max-width: 95%;
            margin: 0 auto;
            background: white;
            border-radius: 0 0 32px 32px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.02);
            overflow: hidden;
            padding: 20px 18px 28px;
            animation: fadeIn 0.3s ease-in;
        }

        .tab-content.active {
            display: block;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* --- Headings & Typography --- */
        h2 {
            font-size: 1.6rem;
            margin-bottom: 16px;
            color: #0f172a;
        }

        h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: #0f172a;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 5px solid #3b82f6;
            padding-left: 14px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- Form Elements
